<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>UAE Helper IA</title>
<style>body{background:#0f172a;color:white;font-family:Arial;padding:20px}.box{max-width:700px;margin:auto;background:#1e293b;padding:20px;border-radius:16px} h1{color:#3b82f6;text-align:center} #chat{height:400px;background:#0f172a;padding:16px;border-radius:12px;overflow-y:auto}.msg{padding:12px;border-radius:12px;margin-bottom:10px;max-width:80%}.user{background:#3b82f6;margin-left:auto;text-align:right}.ai{background:#334155}.row{display:flex;gap:10px} input{flex:1;padding:14px;border:none;border-radius:10px;background:#0f172a;color:white} button{padding:14px;background:#3b82f6;border:none;border-radius:10px;color:white;font-weight:bold}</style>
</head>
<body><div class="box"><h1>🇦🇪 UAE Helper IA</h1><div id="chat"><div class="msg ai">Salut! Expert Dubai ici. Pose ta question.</div></div><div class="row"><input id="q" placeholder="Ex: Prix visa Dubai" onkeypress="if(event.key==='Enter')send()"><button onclick="send()">Envoyer</button></div></div>
<script>
const KEY = "COLLE_TA_CLE_OPENROUTER_ICI";
async function send(){
  const i=document.getElementById('q'),c=document.getElementById('chat'),txt=i.value;if(!txt)return;i.value='';
  c.innerHTML+=<div class="msg user">${txt}</div>;c.innerHTML+=<div class="msg ai" id="load">...L'IA réfléchit</div>;
  const r=await fetch("https://openrouter.ai/api/v1/chat/completions",{method:"POST",headers:{"Authorization":"Bearer "+KEY,"Content-Type":"application/json"},body:JSON.stringify({model:"meta-llama/llama-3.1-8b-instruct:free",messages:[{role:"user",content:txt+" Réponds en français pour Dubai UAE."}]})});
  const d=await r.json();document.getElementById('load').innerHTML=d.choices[0].message.content;
}
</script></body></html>
